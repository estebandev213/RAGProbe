name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (ruff, mypy, pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Tests never call Groq (respx-mocked), but Settings fails fast without a key.
      GROQ_API_KEY: ci-dummy-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check app tests
      - name: Format check
        run: ruff format --check app tests
      - name: Type check
        run: mypy app
      - name: Tests
        run: pytest -q

  frontend:
    name: Frontend (tsc, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
